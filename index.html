<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jim's Açaí Rewards</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2d0845 0%, #4a1070 100%);
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(92vw, 420px);
      background: rgba(255,255,255,0.95);
      color: #2d0845;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 20px; color: #6b5888; line-height: 1.5; }
    .btns { display: grid; gap: 12px; }
    .btn {
      display: block;
      padding: 14px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: #6b1a9a; color: #fff; }
    .btn.secondary { background: #f3e8ff; color: #4a1070; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Jim's Açaí Rewards</h1>
    <p>Choose the portal you want to open.</p>
    <div class="btns">
      <a class="btn primary" href="./jims-acai-customer.html">Customer Portal</a>
      <a class="btn secondary" href="./admin.html">Admin Portal</a>
    </div>
  </main>
</body>
</html>
